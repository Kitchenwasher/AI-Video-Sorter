<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSort — {{ title }}</title>
    <!-- Outfit Font and FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/font-awesome.all.min.css') }}">
    <style>
        :root {
            --bg: #0F0F11;
            --bg-raised: #1A1A1E;
            --text: #F3F3F3;
            --text-muted: #888890;
            --accent: #FF8C00;
            --border: #2C2C30;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle glowing background decorations */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 140, 0, 0.08) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .card {
            background: var(--bg-raised);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 440px;
            width: calc(100% - 48px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
            backdrop-filter: blur(8px);
            transform: translateY(0);
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .icon-container {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 50%;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .icon-container.danger {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }

        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0.75rem 1.75rem;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .logo-footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .logo-footer span {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container {{ 'danger' if is_danger else '' }}">
            <i class="fa-solid {{ icon }}"></i>
        </div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <a href="https://github.com/Kitchenwasher/AI-Video-Sorter" target="_blank" class="btn">
            <i class="fa-brands fa-github"></i> Learn about AuraSort
        </a>
        <div class="logo-footer">
            Aura<span>Sort</span>
        </div>
    </div>
</body>
</html>
